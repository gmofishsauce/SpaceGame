<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpaceGame</title>
  <style>
    /* ------------------------------------------------------------------ */
    /* Reset / base                                                         */
    /* ------------------------------------------------------------------ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }

    /* ------------------------------------------------------------------ */
    /* CSS2D overlay elements (Three.js labels, rings, popups)             */
    /* ------------------------------------------------------------------ */
    .star-label {
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 2px 6px;
      pointer-events: none;
      white-space: pre;
      text-shadow: 0 0 4px #000;
    }

    .planet-ring {
      width: 14px;
      height: 14px;
      border: 1px solid #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .star-popup {
      display: inline-block;
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid #446;
      border-radius: 4px;
      padding: 6px 10px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #ccc;
      pointer-events: none;
      white-space: nowrap;
      transform: translate(-50%, calc(-100% - 6px));
    }
    .star-name   { color: #fff;  font-size: 13px; font-weight: bold; margin-bottom: 3px; }
    .star-status { color: #aac; }
    .star-econ   { color: #ac6; }
    .star-forces { color: #ca6; }

    /* ------------------------------------------------------------------ */
    /* Year display (FR-014)                                               */
    /* ------------------------------------------------------------------ */
    #year-display {
      position: fixed;
      top: 12px;
      left: 12px;
      color: #eee;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      background: rgba(0, 0, 0, 0.55);
      padding: 4px 10px;
      border-radius: 4px;
      z-index: 100;
      pointer-events: none;
    }

    /* ------------------------------------------------------------------ */
    /* Pause overlay (FR-013)                                              */
    /* ------------------------------------------------------------------ */
    #pause-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.35);
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 36px;
      letter-spacing: 6px;
      z-index: 200;
      pointer-events: none;
    }

    /* ------------------------------------------------------------------ */
    /* Sidebar (FR-025, FR-026, FR-027, FR-028)                           */
    /* ------------------------------------------------------------------ */
    #sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: 300px;
      height: 100vh;
      background: rgba(0, 0, 10, 0.88);
      border-left: 1px solid #224;
      overflow-y: auto;
      z-index: 100;
    }

    #sidebar-header {
      padding: 8px 10px;
      border-bottom: 1px solid #224;
      position: sticky;
      top: 0;
      background: rgba(0, 0, 10, 0.97);
      z-index: 1;
    }

    #event-log { padding: 6px 0; }
    #debug-log  { padding: 6px 0; }

    .event-entry {
      padding: 5px 10px;
      border-bottom: 1px solid #112;
      cursor: default;
      display: grid;
      grid-template-columns: 5.5em 1fr;
      grid-template-rows: auto auto;
      column-gap: 6px;
      row-gap: 1px;
    }
    .event-entry:hover { background: rgba(68, 136, 255, 0.12); }

    .evt-year {
      grid-column: 1; grid-row: 1;
      color: #666;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      white-space: nowrap;
    }
    .evt-system {
      grid-column: 2; grid-row: 1;
      color: #99b;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      font-weight: bold;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .evt-desc {
      grid-column: 1 / -1; grid-row: 2;
      color: #888;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.4;
    }

    /* ------------------------------------------------------------------ */
    /* Context menu (FR-029)                                               */
    /* ------------------------------------------------------------------ */
    .context-menu {
      position: fixed;
      background: rgba(0, 0, 18, 0.97);
      border: 1px solid #446;
      border-radius: 4px;
      min-width: 160px;
      z-index: 300;
      overflow: hidden;
    }
    .context-menu-title {
      padding: 6px 12px;
      color: #99b;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      font-weight: bold;
      border-bottom: 1px solid #224;
    }
    .context-menu-item {
      padding: 8px 12px;
      color: #ccc;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      cursor: pointer;
    }
    .context-menu-item:hover:not(.disabled) { background: rgba(68, 136, 255, 0.22); }
    .context-menu-item.disabled { color: #444; cursor: default; }

    /* ------------------------------------------------------------------ */
    /* Modal dialogs (FR-034, FR-037)                                      */
    /* ------------------------------------------------------------------ */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 400;
    }
    .modal-content {
      background: rgba(0, 0, 18, 0.98);
      border: 1px solid #446;
      border-radius: 6px;
      padding: 22px 26px;
      min-width: 320px;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      color: #ccc;
    }
    .modal-content h2 {
      color: #99b;
      font-size: 15px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #224;
    }
    .modal-content p {
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 12px;
      color: #aaa;
    }
    .dialog-note { color: #666 !important; font-size: 11px !important; }

    .weapon-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-bottom: 14px;
    }
    .weapon-table th {
      text-align: left;
      color: #557;
      padding: 4px 6px;
      border-bottom: 1px solid #224;
    }
    .weapon-table td {
      padding: 5px 6px;
      border-bottom: 1px solid #112;
      color: #999;
    }

    .fleet-list { list-style: none; margin-bottom: 14px; }
    .fleet-item {
      padding: 8px 10px;
      border: 1px solid #224;
      border-radius: 3px;
      margin-bottom: 5px;
      cursor: pointer;
      color: #99b;
      font-family: 'Courier New', monospace;
      font-size: 13px;
    }
    .fleet-item:hover { background: rgba(68, 136, 255, 0.18); border-color: #448; }

    /* ------------------------------------------------------------------ */
    /* Buttons                                                             */
    /* ------------------------------------------------------------------ */
    button {
      background: #111128;
      color: #99b;
      border: 1px solid #446;
      border-radius: 3px;
      padding: 6px 16px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      cursor: pointer;
      margin-right: 8px;
      margin-top: 6px;
    }
    button:hover:not(:disabled) { background: #1e1e44; border-color: #66a; color: #bbf; }
    button:disabled { color: #333; border-color: #222; cursor: not-allowed; }
    .cancel-btn { color: #966; border-color: #644; }
    .cancel-btn:hover:not(:disabled) { background: #1e1010; border-color: #a44; color: #faa; }

    /* ------------------------------------------------------------------ */
    /* Game-over screen (FR-058)                                           */
    /* ------------------------------------------------------------------ */
    #game-over-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.78);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
    }
    #game-over-box {
      background: rgba(0, 0, 18, 0.98);
      border: 2px solid #446;
      border-radius: 8px;
      padding: 44px 60px;
      text-align: center;
      font-family: 'Courier New', monospace;
    }
    #game-over-box p {
      color: #888;
      font-size: 14px;
      margin: 18px 0 26px;
      max-width: 380px;
      line-height: 1.6;
    }
    .victory-text { color: #4af; font-size: 52px; letter-spacing: 8px; }
    .defeat-text  { color: #f44; font-size: 52px; letter-spacing: 8px; }

    /* ------------------------------------------------------------------ */
    /* Selection-mode banner (A-5)                                        */
    /* ------------------------------------------------------------------ */
    #selection-banner {
      display: none;
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 10, 30, 0.92);
      border: 1px solid #446;
      border-radius: 4px;
      color: #aac;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 8px 22px;
      z-index: 250;
      pointer-events: none;
    }

    /* ------------------------------------------------------------------ */
    /* Message log (below starfield)                                       */
    /* ------------------------------------------------------------------ */
    #message-log {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 300px;        /* leaves sidebar uncovered */
      height: 140px;       /* room for ~4 event-entry lines */
      background: rgba(0, 0, 10, 0.88);
      border-top: 1px solid #224;
      overflow-y: auto;
      z-index: 100;
    }
    #message-log .msg-line {
      padding: 2px 10px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.6;
    }

    /* ------------------------------------------------------------------ */
    /* Build-all dialog                                                   */
    /* ------------------------------------------------------------------ */
    .build-all-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-bottom: 14px;
    }
    .build-all-table th {
      text-align: left;
      color: #557;
      padding: 4px 6px;
      border-bottom: 1px solid #224;
    }
    .build-all-table td {
      padding: 5px 6px;
      border-bottom: 1px solid #112;
      color: #999;
    }
    .build-all-table select {
      background: #111128;
      color: #99b;
      border: 1px solid #446;
      border-radius: 3px;
      padding: 3px 6px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      cursor: pointer;
    }
    .build-all-table select:focus { outline: none; border-color: #66a; }

    /* ------------------------------------------------------------------ */
    /* Build button (upper-right of starfield)                            */
    /* ------------------------------------------------------------------ */
    #build-btn {
      position: fixed;
      top: 12px;
      right: 312px;   /* clears the 300px sidebar + 12px gap */
      z-index: 100;
    }

    /* ------------------------------------------------------------------ */
    /* Error toast                                                         */
    /* ------------------------------------------------------------------ */
    .error-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(60, 0, 0, 0.97);
      border: 1px solid #844;
      border-radius: 4px;
      color: #faa;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 8px 22px;
      z-index: 600;
      pointer-events: none;
    }
  </style>
  <script type="module" crossorigin src="/assets/index-D5lj4E2z.js"></script>
</head>
<body>
  <div id="year-display">Year: 0.0</div>
  <button id="build-btn">Build&#x2026;</button>
  <div id="selection-banner"></div>
  <div id="pause-overlay">&#9208; PAUSED</div>
  <div id="sidebar">
    <div id="sidebar-header">
      <button id="debug-btn">debug</button>
    </div>
    <div id="event-log"></div>
    <div id="debug-log" style="display:none;"></div>
  </div>
  <div id="message-log">
    <div class="msg-line"><span class="evt-desc">Game initialised. Alien forces are approaching from deep space.</span></div>
    <div class="msg-line"><span class="evt-desc">Build interceptors and comm lasers to extend your sensor range.</span></div>
    <div class="msg-line"><span class="evt-desc">Send reporter fleets to unknown systems to establish early warning.</span></div>
    <div class="msg-line"><span class="evt-desc">Good luck, commander.</span></div>
  </div>
</body>
</html>
